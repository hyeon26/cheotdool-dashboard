name: Patch manual raffle

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch vote page
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('public/vote.html')
          s = p.read_text(encoding='utf-8')

          old = ".manual-draw-actions .btn,.manual-draw-actions .btn-raffle{font-size:20px;padding:14px 28px}"
          new = old + ".manual-save-actions{display:none;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:18px}.manual-save-actions.show{display:flex}.manual-winner-chat-wrap{display:none;margin:22px auto 0;width:min(540px,90vw)}.manual-winner-chat-wrap.show{display:block}"
          if old in s and ".manual-save-actions" not in s:
              s = s.replace(old, new)

          old = ".manual-modal-actions .btn,.manual-modal-actions .btn-raffle,.manual-draw-actions .btn,.manual-draw-actions .btn-raffle{width:100%}"
          new = ".manual-modal-actions .btn,.manual-modal-actions .btn-raffle,.manual-draw-actions .btn,.manual-draw-actions .btn-raffle,.manual-save-actions .btn{width:100%}"
          if old in s:
              s = s.replace(old, new)

          old = '<div class="manual-draw-result" id="manual-draw-result"><div class="manual-draw-label">🎉 당첨자 🎉</div><div class="manual-draw-name" id="manual-draw-name"></div></div>'
          new = '<div class="manual-draw-result" id="manual-draw-result"><div class="manual-draw-label">🎉 당첨자 🎉</div><div class="manual-draw-name" id="manual-draw-name"></div><div class="manual-winner-chat-wrap" id="manual-winner-chat-wrap"><div class="winner-chat-feed" id="manual-winner-chat-feed"></div></div><div class="manual-save-actions" id="manual-save-actions"><button class="btn btn-primary" onclick="saveManualWinner()">✓ 저장</button><button class="btn btn-ghost" onclick="skipManualWinner()">✕ 저장 안함</button></div></div>'
          if old in s:
              s = s.replace(old, new)

          old = 'manualWinnersLog=[],manualStartedAt=null;let currentWinner=null;'
          new = 'manualWinnersLog=[],manualStartedAt=null,manualPendingWinner=null;let currentWinner=null;'
          if old in s:
              s = s.replace(old, new)

          old = "function addWinnerChat(msg){const feed=document.getElementById('winner-chat-feed');if(!feed)return;const div=document.createElement('div');div.className='winner-chat-msg';div.textContent=msg;feed.appendChild(div);feed.scrollTop=feed.scrollHeight}"
          new = "function addWinnerChat(msg){const feedId=currentRaffleKey===MANUAL_RAFFLE_KEY?'manual-winner-chat-feed':'winner-chat-feed';const feed=document.getElementById(feedId);if(!feed)return;const div=document.createElement('div');div.className='winner-chat-msg';div.textContent=msg;feed.appendChild(div);feed.scrollTop=feed.scrollHeight}"
          if old in s:
              s = s.replace(old, new)

          old = "function applyManualRaffle(){const input=document.getElementById('manual-raffle-input');manualRaffleNames=parseManualRaffleNames(input?.value||'');manualWinnersSet=new Set();manualWinnersLog=[];manualStartedAt=new Date();if(window._resetManualDoc)window._resetManualDoc();renderManualRafflePreview();showToast(manualRaffleNames.length?`명단 ${manualRaffleNames.length}명 적용 완료`:'명단을 입력해주세요')}"
          new = "function applyManualRaffle(){const input=document.getElementById('manual-raffle-input');manualRaffleNames=parseManualRaffleNames(input?.value||'');manualWinnersSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=new Date();if(window._resetManualDoc)window._resetManualDoc();renderManualRafflePreview();showToast(manualRaffleNames.length?`명단 ${manualRaffleNames.length}명 적용 완료`:'명단을 입력해주세요')}"
          if old in s:
              s = s.replace(old, new)

          old = "function resetManualRaffle(){manualRaffleNames=[];manualWinnersSet=new Set();manualWinnersLog=[];manualStartedAt=null;if(window._resetManualDoc)window._resetManualDoc();const input=document.getElementById('manual-raffle-input');if(input)input.value='';renderManualRafflePreview();showToast('직접 명단 초기화 완료')}"
          new = "function resetManualRaffle(){manualRaffleNames=[];manualWinnersSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=null;if(window._resetManualDoc)window._resetManualDoc();const input=document.getElementById('manual-raffle-input');if(input)input.value='';renderManualRafflePreview();showToast('직접 명단 초기화 완료')}"
          if old in s:
              s = s.replace(old, new)

          old = "function closeManualDrawModal(){document.getElementById('manual-draw-modal')?.classList.remove('show');document.getElementById('manual-draw-result')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualRafflePreview()}"
          new = "function closeManualDrawModal(){manualPendingWinner=null;currentWinner=null;document.getElementById('manual-draw-modal')?.classList.remove('show');document.getElementById('manual-draw-result')?.classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualRafflePreview()}"
          if old in s:
              s = s.replace(old, new)

          old = "if(btn)btn.disabled=!manualRaffleNames.some(n=>!manualWinnersSet.has(n))}function startManualRaffle()"
          new = "if(btn)btn.disabled=!!manualPendingWinner||!manualRaffleNames.some(n=>!manualWinnersSet.has(n))}function startManualRaffle()"
          if old in s:
              s = s.replace(old, new)

          old = "document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';openManualDrawModal();renderManualDrawVoters()}function drawManualRaffle()"
          new = "document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';openManualDrawModal();renderManualDrawVoters()}function drawManualRaffle()"
          if old in s:
              s = s.replace(old, new)

          old = "function drawManualRaffle(){if(!manualRaffleNames.length)return;if(!manualStartedAt)manualStartedAt=new Date();currentRaffleKey=MANUAL_RAFFLE_KEY;raffleVoters=manualRaffleNames.slice();winnersSet=manualWinnersSet;document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualDrawVoters();startRaffle()}"
          new = "function drawManualRaffle(){if(manualPendingWinner){showToast('저장 여부를 먼저 선택해주세요');return}if(!manualRaffleNames.length)return;if(!manualStartedAt)manualStartedAt=new Date();currentRaffleKey=MANUAL_RAFFLE_KEY;raffleVoters=manualRaffleNames.slice();winnersSet=manualWinnersSet;document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualDrawVoters();startRaffle()}"
          if old in s:
              s = s.replace(old, new)

          old = "function showManualDrawWinner(name){currentWinner=name;renderManualDrawVoters();const idx=raffleVoters.indexOf(name);if(idx>=0){const chip=document.getElementById(`draw-chip-${idx}`);if(chip){chip.classList.remove('lit');chip.classList.add('won')}}document.getElementById('manual-draw-name').textContent=name;document.getElementById('manual-draw-result').classList.add('show');launchConfetti('manual-confetti-wrap');if(!manualWinnersLog.includes(name)){manualWinnersLog.push(name);if(window._upsertManualResult)window._upsertManualResult('직접 명단 추첨',[...manualWinnersLog],manualStartedAt||new Date()).catch(()=>{})}const btn=document.getElementById('btn-manual-redraw');if(btn)btn.disabled=!manualRaffleNames.some(n=>!manualWinnersSet.has(n))}"
          new = "function showManualDrawWinner(name){currentWinner=name;manualPendingWinner=name;renderManualDrawVoters();const idx=raffleVoters.indexOf(name);if(idx>=0){const chip=document.getElementById(`draw-chip-${idx}`);if(chip){chip.classList.remove('lit');chip.classList.add('won')}}document.getElementById('manual-draw-name').textContent=name;document.getElementById('manual-draw-result').classList.add('show');document.getElementById('manual-save-actions')?.classList.add('show');document.getElementById('manual-winner-chat-wrap')?.classList.add('show');document.getElementById('manual-winner-chat-feed').innerHTML='';launchConfetti('manual-confetti-wrap');const btn=document.getElementById('btn-manual-redraw');if(btn)btn.disabled=true}"
          if old in s:
              s = s.replace(old, new)

          insert_after = "function showManualDrawWinner(name){currentWinner=name;manualPendingWinner=name;renderManualDrawVoters();const idx=raffleVoters.indexOf(name);if(idx>=0){const chip=document.getElementById(`draw-chip-${idx}`);if(chip){chip.classList.remove('lit');chip.classList.add('won')}}document.getElementById('manual-draw-name').textContent=name;document.getElementById('manual-draw-result').classList.add('show');document.getElementById('manual-save-actions')?.classList.add('show');document.getElementById('manual-winner-chat-wrap')?.classList.add('show');document.getElementById('manual-winner-chat-feed').innerHTML='';launchConfetti('manual-confetti-wrap');const btn=document.getElementById('btn-manual-redraw');if(btn)btn.disabled=true}"
          funcs = "function saveManualWinner(){const name=manualPendingWinner;if(!name)return;if(!manualWinnersLog.includes(name)){manualWinnersLog.push(name);if(window._upsertManualResult)window._upsertManualResult('직접 명단 추첨',[...manualWinnersLog],manualStartedAt||new Date()).catch(()=>{})}manualPendingWinner=null;currentWinner=null;document.getElementById('manual-save-actions')?.classList.remove('show');renderManualDrawVoters();showToast('content에 저장했습니다')}function skipManualWinner(){if(!manualPendingWinner)return;manualPendingWinner=null;currentWinner=null;document.getElementById('manual-save-actions')?.classList.remove('show');renderManualDrawVoters();showToast('저장하지 않고 제외했습니다')}"
          if insert_after in s and "function saveManualWinner()" not in s:
              s = s.replace(insert_after, insert_after + funcs)

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vote.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add manual raffle save choice [skip patch]"
            git push
          fi
