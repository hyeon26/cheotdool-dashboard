name: manual cancel grey
on: push
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip grey]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('public/vote.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('manualWinnersSet=new Set(),manualWinnersLog=[],manualStartedAt=null,manualPendingWinner=null;let currentWinner=null;', 'manualWinnersSet=new Set(),manualCancelledSet=new Set(),manualWinnersLog=[],manualStartedAt=null,manualPendingWinner=null;let currentWinner=null;')
          s=s.replace('${manualWinnersSet.has(n)?\'won\':\'\'}">${escapeHTML(n)}</span>`).join(\'\')', '${manualCancelledSet.has(n)?\'won-cancelled\':manualWinnersSet.has(n)?\'won\':\'\'}">${escapeHTML(n)}</span>`).join(\'\')')
          s=s.replace('${manualWinnersSet.has(n)?\'won\':\'\'}" id="draw-chip-${i}">${escapeHTML(n)}</span>`).join(\'\')', '${manualCancelledSet.has(n)?\'won-cancelled\':manualWinnersSet.has(n)?\'won\':\'\'}" id="draw-chip-${i}">${escapeHTML(n)}</span>`).join(\'\')')
          s=s.replace('manualWinnersSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=new Date();', 'manualWinnersSet=new Set();manualCancelledSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=new Date();')
          s=s.replace('manualWinnersSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=null;', 'manualWinnersSet=new Set();manualCancelledSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=null;')
          s=s.replace('if(!manualWinnersLog.includes(name)){manualWinnersLog.push(name);', 'manualCancelledSet.delete(name);if(!manualWinnersLog.includes(name)){manualWinnersLog.push(name);')
          s=s.replace('function skipManualWinner(){if(!manualPendingWinner)return;manualPendingWinner=null;', 'function skipManualWinner(){if(!manualPendingWinner)return;manualCancelledSet.add(manualPendingWinner);manualPendingWinner=null;')
          p.write_text(s,encoding='utf-8')
          PY
      - run: |
          git config user.name bot
          git config user.email bot@example.com
          git add public/vote.html
          git commit -m 'Manual cancelled winners grey [skip grey]' || exit 0
          git push
