name: label fix
on: push
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('public/vote.html')
          s=p.read_text()
          s=s.replace('✓ 저장</button>','✓ 확인</button>')
          s=s.replace('✕ 저장 안함</button>','✕ 취소</button>')
          p.write_text(s)
          PY
      - run: |
          git config user.name bot
          git config user.email bot@example.com
          git add public/vote.html
          git commit -m label-fix || exit 0
          git push
