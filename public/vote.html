<style>

.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}.modal.show{display:flex}.modal-box{width:min(1100px,98vw);max-height:90vh;overflow:auto;background:#1e1e1e;border:1px solid rgba(255,255,255,.09);border-radius:16px;box-shadow:var(--shadow);padding:24px}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.modal-title{font-size:21.5px;font-weight:900;color:var(--text)}.modal-close{background:transparent;color:#888;border:1px solid rgba(255,255,255,.1);width:38px;height:38px;border-radius:50%;font-size:23.5px;cursor:pointer;line-height:1}.modal-voters{display:flex;flex-wrap:wrap;gap:8px}.modal-empty{color:#4a4a4a;font-size:17.5px}

.empty{text-align:center;padding:40px 20px;color:#4a4a4a}.empty-icon{font-size:37.5px;margin-bottom:10px;opacity:.4}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1e1e1e;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:12px 20px;font-size:14.5px;font-weight:600;color:var(--text);box-shadow:var(--shadow);transition:transform .3s;z-index:999;white-space:nowrap}.toast.show{transform:translateX(-50%) translateY(0)}

.winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;opacity:0;transition:opacity .4s;pointer-events:none;overflow:hidden}.winner-overlay.show{opacity:1;pointer-events:all}.winner-crown{font-size:91.5px;margin-bottom:12px;animation:crown-bounce .5s ease infinite alternate;display:inline-block;filter:drop-shadow(0 0 24px #f59e0b)}@keyframes crown-bounce{from{transform:translateY(0) scale(1) rotate(-4deg)}to{transform:translateY(-14px) scale(1.12) rotate(4deg)}}.winner-label{font-size:19.5px;font-weight:700;color:#f59e0b;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;animation:fadein .4s ease}.winner-name{font-size:73.5px;font-weight:900;color:#fff;text-align:center;padding:0 32px;letter-spacing:-1px;animation:winner-pop .6s cubic-bezier(.175,.885,.32,1.275) both;text-shadow:0 0 40px rgba(255,255,255,.3)}@keyframes winner-pop{from{transform:scale(.3) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}.winner-option{font-size:21.5px;color:#888;margin-top:10px;animation:fadein .6s .3s ease both}.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}.cf{position:absolute;border-radius:2px;will-change:transform,opacity}.winner-close{padding:12px 36px;border-radius:12px;font-size:19.5px;font-weight:800;font-family:inherit;cursor:pointer;border:none;background:#2ecc71;color:#000;box-shadow:0 2px 16px rgba(46,204,113,.4)}.winner-close:hover{opacity:.88}.winner-chat-wrap{margin-top:28px;width:min(540px,90vw)}.winner-chat-feed{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 20px;height:150px;overflow-y:auto;display:flex;flex-direction:column;justify-content:center}.winner-chat-feed::-webkit-scrollbar{width:3px}.winner-chat-feed::-webkit-scrollbar-thumb{background:#444;border-radius:3px}.winner-chat-msg{font-size:25.5px;font-weight:700;color:#fff;text- function parseNumberToken(text){if(!/^[0-9]+$/.test(text))return NaN;const first=text[0];if([...text].every(ch=>ch===first))return Number(first);return Number(text)}function processVote(nick,msg){if(!voteRunning)return;const text=msg.trim();const keys=Object.keys(voteOptions);if(!keys.length)return;let matchedKey=null;const cmdPrefix='!투표';if(text.startsWith(cmdPrefix)){const num=parseNumberToken(text.slice(cmdPrefix.length).trim());if(!Number.isNaN(num)&&num>=1&&num<=keys.length)matchedKey=keys[num-1]}if(!matchedKey)matchedKey=keys.find(k=>voteOptions[k]===text);if(!matchedKey){const num=parseNumberToken(text);if(!Number.isNaN(num)&&num>=1&&num<=keys.length)matchedKey=keys[num-1]}if(!matchedKey)return;const prev=voterMap[nick];if(prev===matchedKey)return;if(prev)voteCounts[prev]=Math.max(0,(voteCounts[prev]||0)-1);voterMap[nick]=matchedKey;voteCounts[matchedKey]=(voteCounts[matchedKey]||0)+1;updateStats();renderResults();launchBallot()}function updateStats(){const el=document.getElementById('total-votes');if(el)el.textContent=Object.values(voteCounts).reduce((s,v)=>s+v,0)}
function renderResults(){const el=document.getElementById('results');if(!el)return;const keys=Object.keys(voteOptions).length>0?Object.keys(voteOptions):Object.keys(voteCounts);if(!keys.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🗳</div><div>항목을 설정하고 투표를 시작하세요</div></div>`;return}const total=Object.values(voteCounts).reduce((s,v)=>s+v,0)||1;const sorted=keys.slice().sort((a,b)=>(voteCounts[b]||0)-(voteCounts[a]||0));const maxV=voteCounts[sorted[0]]||0;if(!window.optionColors)window.optionColors={};keys.forEach(k=>{if(!window.optionColors[k])window.optionColors[k]=`hsl(${Math.floor(Math.random()*360)},70%,58%)`});Object.keys(window.optionColors).forEach(k=>{if(!keys.includes(k))delete window.optionColors[k]});el.innerHTML=keys.map(k=>{const cnt=voteCounts[k]||0,pct=Math.round(cnt/total*100),isFirst=cnt>0&&cnt===maxV,col=window.optionColors[k];return`<div class="vote-item${isFirst?' first':''}" onclick="showOptionVoters('${escapeAttr(k)}')"><div class="vote-item-header"><div class="vote-item-name"><div class="vote-badge" style="${!isFirst?`background:${col}`:''}">${escapeHTML(k)}</div>${escapeHTML(voteOptions[k]||k)}</div><div class="vote-count">${cnt}표 (${pct}%)</div></div><div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%;${!isFirst?`background:${col}`:''}"></div></div></div>`}).join('')}
function showOptionVoters(key){closeManualRaffleModal();closeManualDrawModal();const voters=Object.keys(voterMap).filter(n=>voterMap[n]===key);const label=voteOptions[key]||`${key}번`;currentRaffleKey=key;raffleVoters=voters;winnersSet=new Set();document.getElementById('modal-title').textContent=`${label} (${voters.length}명)`;document.getElementById('modal-voters').innerHTML=voters.length?voters.map((n,i)=>`<span class="voter-chip" id="chip-${i}">${escapeHTML(n)}</span>`).join(''):`<div class="modal-empty">투표 인원 없음</div>`;const btn=document.getElementById('btn-raffle');btn.disabled=!voters.length;document.getElementById('voter-modal').classList.add('show')}
function parseManualRaffleNames(text){const seen=new Set();const sep=String.fromCharCode(10);return String(text||'').replaceAll(',',sep).split(sep).map(v=>v.trim()).filter(Boolean).filter(name=>{if(seen.has(name))return false;seen.add(name);return true})}function openManualRaffleModal(){closeVoterModal();closeManualDrawModal();renderManualRafflePreview();document.getElementById('manual-raffle-modal').classList.add('show')}function closeManualRaffleModal(){document.getElementById('manual-raffle-modal')?.classList.remove('show')}function onManualRaffleBackdrop(e){if(e.target.id==='manual-raffle-modal')closeManualRaffleModal()}function renderManualRafflePreview(){const el=document.getElementById('manual-raffle-preview'),btn=document.getElementById('btn-manual-raffle');if(!el||!btn)return;btn.disabled=!manualRaffleNames.some(n=>!manualWinnersSet.has(n));if(!manualRaffleNames.length){el.innerHTML='<div class="modal-empty">명단을 입력하고 적용을 눌러주세요</div>';return}el.innerHTML=manualRaffleNames.map(n=>`<span class="voter-chip ${manualCancelledSet.has(n)?'won-cancelled':manualWinnersSet.has(n)?'won':''}">${escapeHTML(n)}</span>`).join('')}function applyManualRaffle(){const input=document.getElementById('manual-raffle-input');manualRaffleNames=parseManualRaffleNames(input?.value||'');manualWinnersSet=new Set();manualCancelledSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=new Date();if(window._resetManualDoc)window._resetManualDoc();renderManualRafflePreview();showToast(manualRaffleNames.length?`명단 ${manualRaffleNames.length}명 적용 완료`:'명단을 입력해주세요')}function resetManualRaffle(){manualRaffleNames=[];manualWinnersSet=new Set();manualCancelledSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=null;if(window._resetManualDoc)window._resetManualDoc();const input=document.getElementById('manual-raffle-input');if(input)input.value='';renderManualRafflePreview();showToast('직접 추첨 초기화 완료')}
function openManualDrawModal(){document.getElementById('manual-draw-modal').classList.add('show')}function closeManualDrawModal(){manualPendingWinner=null;currentWinner=null;document.getElementById('manual-draw-modal')?.classList.remove('show');document.getElementById('manual-draw-result')?.classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualRafflePreview()}function onManualDrawBackdrop(e){if(e.target.id==='manual-draw-modal')closeManualDrawModal()}function renderManualDrawVoters(){const el=document.getElementById('manual-draw-voters');if(!el)return;el.innerHTML=manualRaffleNames.map((n,i)=>`<span class="voter-chip ${manualCancelledSet.has(n)?'won-cancelled':manualWinnersSet.has(n)?'won':''}" id="draw-chip-${i}">${escapeHTML(n)}</span>`).join('');const btn=document.getElementById('btn-manual-redraw');if(btn)btn.disabled=!!manualPendingWinner||!manualRaffleNames.some(n=>!manualWinnersSet.has(n))}function startManualRaffle(){if(!manualRaffleNames.length){applyManualRaffle();if(!manualRaffleNames.length)return}if(!manualStartedAt)manualStartedAt=new Date();currentRaffleKey=MANUAL_RAFFLE_KEY;raffleVoters=manualRaffleNames.slice();winnersSet=manualWinnersSet;closeManualRaffleModal();document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';openManualDrawModal();renderManualDrawVoters()}function drawManualRaffle(){if(manualPendingWinner){showToast('저장 여부를 먼저 선택해주세요');return}if(!manualRaffleNames.length)return;if(!manualStartedAt)manualStartedAt=new Date();currentRaffleKey=MANUAL_RAFFLE_KEY;raffleVoters=manualRaffleNames.slice();winnersSet=manualWinnersSet;document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualDrawVoters();startRaffle()}
function randomIndex(length){if(length<=0)return 0;if(window.crypto?.getRandomValues){const bucket=new Uint32Array(1);const max=Math.floor(0x100000000/length)*length;do{window.crypto.getRandomValues(bucket)}while(bucket[0]>=max);return bucket[0]%length}return Math.floor(Math.random()*length)}function pickRaffleWinner(eligible){if(eligible.length<=1||raffleVoters.length<8)return eligible[randomIndex(eligible.length)];const segmentCount=Math.min(4,Math.max(2,Math.floor(raffleVoters.length/5)));const segmentSize=Math.ceil(raffleVoters.length/segmentCount);const picked=Array(segmentCount).fill(0),groups=Array.from({length:segmentCount},()=>[]);raffleVoters.forEach((name,idx)=>{if(winnersSet.has(name))picked[Math.min(segmentCount-1,Math.floor(idx/segmentSize))]++});eligible.forEach(item=>groups[Math.min(segmentCount-1,Math.floor(item.idx/segmentSize))].push(item));const active=groups.map((items,idx)=>({items,idx,score:picked[idx]})).filter(g=>g.items.length);const minScore=Math.min(...active.map(g=>g.score));const pool=active.filter(g=>g.score===minScore);const group=pool[randomIndex(pool.length)];return group.items[randomIndex(group.items.length)]}function startRaffle(){if(!raffleVoters.length)return;const eligible=raffleVoters.map((n,i)=>({name:n,idx:i})).filter(o=>!winnersSet.has(o.name));if(!eligible.length){showToast('🎉 모든 참가자가 당첨됐어요!');return}const isManual=currentRaffleKey===MANUAL_RAFFLE_KEY;const btn=isManual?document.getElementById('btn-manual-redraw'):document.getElementById('btn-raffle');if(btn)btn.disabled=true;const chipPrefix=isManual?'draw-chip-':'chip-';const chips=raffleVoters.map((_,i)=>document.getElementById(`${chipPrefix}${i}`));const winner=pickRaffleWinner(eligible);const total=eligible.length;const SLOW_STEPS=Math.min(8,total);const winnerEligibleIdx=eligible.findIndex(o=>o.idx===winner.idx);const slowStartPos=(winnerEligibleIdx-SLOW_STEPS+1+total*100)%total;const slowDelays=Array.from({length:SLOW_STEPS},(_,i)=>Math.round(90+Math.pow((i+1)/SLOW_STEPS,1.75)*900)+randomIndex(61)-30);const laps=total<=10?3+randomIndex(4):total<=30?2+randomIndex(3):1+randomIndex(3);const startOffset=randomIndex(total);const fastFrames=total*laps+((slowStartPos-startOffset+total*100)%total);const fastDelay=total<=10?55+randomIndex(46):total<=30?18+randomIndex(24):12+randomIndex(13);let frame=0,lastLit=-1;function litChip(eligiblePos,on){const chip=chips[eligible[eligiblePos%total].idx];if(!chip)return;chip.classList.toggle('lit',on)}function step(){if(lastLit>=0)litChip(lastLit,false);if(frame>=fastFrames+SLOW_STEPS){const winChip=chips[winner.idx];if(winChip)winChip.classList.add('lit');winChip?.scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});setTimeout(()=>showWinner(winner.name),800);if(btn)btn.disabled=false;return}const pos=frame<fastFrames?(startOffset+frame)%total:(slowStartPos+(frame-fastFrames))%total;litChip(pos,true);lastLit=pos;const delay=frame<fastFrames?fastDelay:slowDelays[frame-fastFrames];frame++;setTimeout(step,delay)}step()}
const CF_COLORS=['#2ecc71','#f59e0b','#ef4444','#3b82f6','#a855f7','#ec4899','#fff','#fbbf24'];function launchConfetti(targetId='confetti-wrap'){const wrap=document.getElementById(targetId);if(!wrap)return;wrap.innerHTML='';const rect=wrap.getBoundingClientRect();const W=rect.width||window.innerWidth,H=rect.height||window.innerHeight;[{x:W*.18,y:H,baseAngle:-Math.PI*.72},{x:W*.82,y:H,baseAngle:-Math.PI*.28}].forEach(origin=>{for(let i=0;i<90;i++){const el=document.createElement('div');el.className='cf';const color=CF_COLORS[Math.floor(Math.random()*CF_COLORS.length)],w=7+Math.random()*12,h=11+Math.random()*16;el.style.cssText=`width:${w}px;height:${h}px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};position:absolute;left:0;top:0;`;wrap.appendChild(el);const angle=origin.baseAngle+(Math.random()-.5)*Math.PI*.6,speed=18+Math.random()*22;let vx=Math.cos(angle)*speed,vy=Math.sin(angle)*speed,x=origin.x,y=origin.y,rot=Math.random()*360;const rotSpeed=(Math.random()-.5)*18,gravity=.55,delay=Math.random()*300;setTimeout(()=>{let frame=0,maxFrames=140;function tick(){vy+=gravity;x+=vx;y+=vy;vx*=.985;rot+=rotSpeed;el.style.transform=`translate(${x}px,${y}px) rotate(${rot}deg)`;el.style.opacity=Math.max(0,1-frame/maxFrames);if(frame<maxFrames&&y<H+80){frame++;requestAnimationFrame(tick)}else el.remove()}requestAnimationFrame(tick)},delay)}})}
function getLottoSource(){const voterModalOpen=document.getElementById('voter-modal')?.classList.contains('show');if(voterModalOpen&&raffleVoters.length)return{label:`현재 투표 항목 · ${raffleVoters.length}명`,names:raffleVoters.filter(n=>!winnersSet.has(n))};const chatNames=Object.keys(voterMap||{});if(chatNames.length)return{label:`채팅 투표 참여자 · ${chatNames.length}명`,names:chatNames};if(manualRaffleNames.length)return{label:`직접 명단 · ${manualRaffleNames.length}명`,names:manualRaffleNames.filter(n=>!manualWinnersSet.has(n))};return{label:'',names:[]}}function openLottoModal(){const source=getLottoSource();if(!source.names.length){showToast('로또 추첨할 명단이 없어요');return}closeVoterModal();closeManualRaffleModal();closeManualDrawModal();lottoCandidates=source.names.slice();document.getElementById('lotto-source').textContent=source.label;document.getElementById('lotto-modal').classList.add('show');resetLottoBalls()}function closeLottoModal(){stopLottoAnimation();document.getElementById('lotto-modal')?.classList.remove('show')}function onLottoBackdrop(e){if(e.target.id==='lotto-modal')closeLottoModal()}function resetLottoBalls(){lottoDrawn=false;document.getElementById('lotto-result')?.classList.remove('show');const conf=document.getElementById('lotto-confetti-wrap');if(conf)conf.innerHTML='';const btn=document.getElementById('btn-lotto-draw');if(btn)btn.disabled=false;renderLottoBalls();startLottoAnimation()}function renderLottoBalls(){const stage=document.getElementById('lotto-machine');if(!stage)return;stage.querySelectorAll('.lotto-ball').forEach(el=>el.remove());const rect=stage.getBoundingClientRect(),w=Math.max(260,rect.width||900),h=Math.max(220,rect.height||420),count=Math.min(lottoCandidates.length,80);lottoBalls=[];for(let i=0;i<count;i++){const name=lottoCandidates[i],el=document.createElement('div');el.className='lotto-ball';el.textContent=name.length>4?name.slice(0,4):name;stage.appendChild(el);const size=58;lottoBalls.push({el,name,x:randomIndex(Math.max(1,Math.floor(w-s onst btn=document.getElementById('btn-manual-redraw');if(btn)btn.disabled=true}function saveManualWinner(){const name=manualPendingWinner;if(!name)return;manualCancelledSet.delete(name);manualCancelledSet.delete(name);if(!manualWinnersLog.includes(name)){manualWinnersLog.push(name);if(window._upsertManualResult)window._upsertManualResult('직접 추첨',[...manualWinnersLog],manualStartedAt||new Date()).catch(()=>{})}manualPendingWinner=null;currentWinner=null;document.getElementById('manual-save-actions')?.classList.remove('show');renderManualDrawVoters();showToast('content에 저장했습니다')}function skipManualWinner(){if(!manualPendingWinner)return;manualCancelledSet.add(manualPendingWinner);manualPendingWinner=null;currentWinner=null;document.getElementById('manual-save-actions')?.classList.remove('show');renderManualDrawVoters();showToast('저장하지 않고 제외했습니다')}

rols();toggleVotePanels()}else{wsConnected=false;dot.className='ws-dot';dot.style.background='';label.textContent='연결 안됨'}}function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
