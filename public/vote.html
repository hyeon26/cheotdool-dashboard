<style>

;line-height:1.7;animation:fadein .3s ease}@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

<body>
<div class="wrap">
  <div class="header">
    <div class="header-badge"><img class="brand-logo" src="/logo.png" alt="첫째와둘째 로고"/>첫째와둘째</div>
    <div class="header-manual-raffle"><button class="btn-raffle btn-header-raffle" onclick="openManualRaffleModal()">🎰 직접 명단 추첨</button></div>
    <h1>🗳 실시간 채팅 투표</h1>
    <p>채팅창에 <strong>항목 이름</strong>, <strong>번호</strong>, 또는 <strong>!투표 번호</strong>를 입력하면 투표됩니다</p>
  </div>
  <div class="card" id="setup-card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px"><div class="ws-dot" id="ws-dot"></div><span id="ws-label" style="font-size:14px;font-weight:700;color:#888">연결 안됨</span></div>
      <div id="status-right" style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary" id="btn-start" onclick="startVote()" style="padding:8px 16px;font-size:15px">▶ 투표 시작</button><button class="btn btn-ghost" id="btn-reset" onclick="resetVote()" style="padding:8px 16px;font-size:15px">🗑 초기화</button><button class="btn btn-danger" id="btn-end" onclick="endVote()" style="display:none;padding:8px 16px;font-size:15px">⏹ 투표 종료</button></div>
    </div>
    <input id="vote-title-input" class="vote-title-input" placeholder="투표 제목을 입력하세요" autocomplete="off"/>
    <div id="options-wrap"></div>
    <div id="results-inline" style="display:none"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-size:16px;font-weight:800;color:#4a4a4a">결과</div><div style="font-size:13px;font-weight:700;color:#555">총 <span id="total-votes" style="color:#888;font-size:16px;font-weight:900">0</span>표</div></div><div id="results"></div></div>
    <div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-ghost" id="btn-add-option" onclick="addOption()" style="flex:1">＋ 항목 추가</button></div>
  </div>
  <div class="card" id="anim-card" style="display:none"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:14px;font-weight:700;color:#4a4a4a">🗳 투표 진행 중</div><div style="font-size:11px;color:#333">투표가 들어올 때마다 투표용지가 떨어져요</div></div><div class="ballot-stage" id="ballot-stage"><div class="pile-wrap" id="pile-wrap"></div></div></div>
</div>

<div class="modal" id="manual-raffle-modal" onclick="onManualRaffleBackdrop(event)">
  <div class="modal-box">
    <div class="modal-head"><div class="modal-title">🎰 직접 명단 추첨</div><button class="modal-close" onclick="closeManualRaffleModal()" aria-label="닫기">×</button></div>
    <textarea id="manual-raffle-input" class="manual-raffle-input" placeholder="줄바꿈 또는 쉼표로 구분해서 입력하세요. 중복 이름은 한 명으로 처리됩니다."></textarea>
    <div class="manual-modal-actions"><button class="btn btn-primary" onclick="applyManualRaffle()">명단 적용</button><button class="btn-raffle btn-manual-draw" id="btn-manual-raffle" onclick="startManualRaffle()" disabled>🎰 명단에서 뽑기</button><button class="btn btn-danger" onclick="resetManualRaffle()">초기화</button></div>
    <div class="manual-raffle-preview" id="manual-raffle-preview"><div class="modal-empty">명단을 입력하고 적용을 눌러주세요</div></div>
  </div>
</div>

<div class="modal manual-draw-modal" id="manual-draw-modal" onclick="onManualDrawBackdrop(event)">
  <div class="modal-box manual-draw-box">
    <div class="confetti-wrap" id="manual-confetti-wrap"></div>
    <div class="manual-draw-content">
      <div class="modal-head"><div class="modal-title">🎰 직접 명단 추첨 결과</div><button class="modal-close" onclick="closeManualDrawModal()" aria-label="닫기">×</button></div>
      <div class="manual-draw-voters" id="manual-draw-voters"></div>
      <div class="manual-draw-result" id="manual-draw-result"><div class="manual-draw-label">🎉 당첨자 🎉</div><div class="manual-draw-name" id="manual-draw-name"></div><div class="manual-winner-chat-wrap" id="manual-winner-chat-wrap"><div class="winner-chat-feed" id="manual-winner-chat-feed"></div></div><div class="manual-save-actions" id="manual-save-actions"><button class="btn btn-primary" onclick="saveManualWinner()">✓ 저장</button><button class="btn btn-ghost" onclick="skipManualWinner()">✕ 저장 안함</button></div></div>
      <div class="manual-draw-actions"><button class="btn-raffle btn-manual-draw" id="btn-manual-redraw" onclick="drawManualRaffle()">🎰 추첨</button><button class="btn btn-ghost" onclick="closeManualDrawModal()">닫기</button></div>
    </div>
  </div>
</div>

<div class="modal" id="voter-modal" onclick="onModalBackdrop(event)"><div class="modal-box"><div class="modal-head"><div class="modal-title" id="modal-title">투표자 목록</div><div style="display:flex;gap:10px;align-items:center"><button class="btn-raffle" id="btn-raffle" onclick="startRaffle()">🎰 당첨자 뽑기</button><button class="modal-close" onclick="closeVoterModal()" aria-label="닫기">×</button></div></div><div class="modal-voters" id="modal-voters"></div></div></div>
<div class="winner-overlay" id="winner-overlay"><div class="confetti-wrap" id="confetti-wrap"></div><div class="winner-crown">🏆</div><div class="winner-label">🎉 당첨자 🎉</div><div class="winner-name" id="winner-name"></div><div class="winner-option" id="winner-option"></div><div class="winner-chat-wrap"><div class="winner-chat-feed" id="winner-chat-feed"></div></div><div style="display:flex;gap:14px;margin-top:32px"><button class="winner-close" style="background:#333;color:#aaa;box-shadow:none" onclick="cancelWinner()">✕ 취소</button><button class="winner-close" onclick="closeWinner()">✓ 확인</button></div></div>
<div class="toast" id="toast"></div>

<script>

let voteOptions={},voteCounts={},voterMap={},voteStartedAt=null,winnersLog=[];let ws=null,wsConnected=false,wsReconnectTimer=null,wsAutoReconnect=true,channelIdCache=null;let voteRunning=false,voteEnded=false,pileCount=0;let optionRows=[{id:1,label:''},{id:2,label:''}],optRowId=3;let currentRaffleKey=null,raffleVoters=[],winnersSet=new Set();let manualRaffleNames=[],manualWinnersSet=new Set(),manualWinnersLog=[],manualStartedAt=null,manualPendingWinner=null;let currentWinner=null;let ballotQueue=0,ballotRunning=false;
function escapeHTML(str){return String(str).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}function escapeAttr(str){return escapeHTML(str)}

function syncOptionInputs(){optionRows.forEach(o=>{const el=document.getElementById(`opt-${o.id}`);if(el)o.label=el.value})}function addOption(){syncOptionInputs();optionRows.push({id:optRowId++,label:''});renderOptionInputs();updateVoteControls()}function removeOption(id){if(optionRows.length<=1)return;syncOptionInputs();optionRows=optionRows.filter(o=>o.id!==id);renderOptionInputs();updateVoteControls()}function applyOptions(){optionRows.forEach(o=>{o.label=document.getElementById(`opt-${o.id}`)?.value?.trim()||''});voteOptions={};window.optionColors={};optionRows.forEach((o,i)=>{voteOptions[String(i+1)]=o.label||String(i+1)});const nc={};Object.keys(voteOptions).forEach(k=>{nc[k]=voteCounts[k]||0});voteCounts=nc;renderResults()}
function updateVoteControls(){document.getElementById('btn-start').style.display=voteRunning?'none':'';document.getElementById('btn-reset').style.display=voteRunning?'none':'';document.getElementById('btn-end').style.display=voteRunning?'':'none';const setupVisible=!voteRunning&&!voteEnded;document.getElementById('btn-add-option').style.display=setupVisible?'':'none';document.getElementById('vote-title-input').readOnly=!setupVisible;document.querySelectorAll('.option-input').forEach(el=>{el.readOnly=!setupVisible});document.querySelectorAll('.btn-remove-opt').forEach(el=>{el.style.display=setupVisible?'':'none'})}
function toggleVotePanels(){const show=!voteRunning&&voteEnded;document.getElementById('anim-card').style.display=voteRunning?'':'none';document.getElementById('results-inline').style.display=show?'':'none';document.getElementById('options-wrap').style.display=show?'none':''}function startVote(){applyOptions();voteRunning=true;voteEnded=false;voteStartedAt=new Date();winnersLog=[];pileCount=0;renderPile();updateVoteControls();toggleVotePanels();showToast('▶ 투표 진행 중')}function endVote(){voteRunning=false;voteEnded=true;updateVoteControls();toggleVotePanels();showToast('⏹ 투표 종료 · 결과를 확인하세요')}function resetVote(){voteCounts={};voterMap={};voteEnded=false;pileCount=0;voteStartedAt=null;winnersLog=[];Object.keys(voteOptions).forEach(k=>{voteCounts[k]=0});renderPile();updateStats();renderResults();toggleVotePanels();closeVoterModal();updateVoteControls();wsAutoReconnect=true;if(!wsConnected)wsConnect();showToast('🗑 초기화 완료')}
function seededRand(seed){return((seed*9301+49297)%233280)/233280}const PILE_STAGE_W=800,VISIBLE_PILE=60;function renderPile(){const wrap=document.getElementById('pile-wrap');if(wrap&&pileCount===0)wrap.innerHTML=''}function launchBallot(){ballotQueue++;if(!ballotRunning)processBallotQueue()}function processBallotQueue(){if(ballotQueue===0){ballotRunning=false;return}ballotRunning=true;const batch=Math.min(ballotQueue,8);ballotQueue-=batch;const stage=document.getElementById('ballot-stage');if(!stage){ballotRunning=false;return}const sw=stage.offsetWidth,sh=stage.offsetHeight;for(let b=0;b<batch;b++){setTimeout(()=>{const paper=document.createElement('div');paper.className='ballot-fly';const targetX=Math.floor(Math.random()*(sw-60))+8,targetY=sh-66;paper.style.cssText=`top:-70px;left:${targetX}px;opacity:1;transform:rotate(${Math.random()*20-10}deg);`;stage.appendChild(paper);requestAnimationFrame(()=>requestAnimationFrame(()=>{const dur=260+Math.random()*100;paper.style.transition=`top ${dur}ms cubic-bezier(.55,0,1,1)`;paper.style.top=`${targetY}px`;setTimeout(()=>{const wrap=document.getElementById('pile-wrap');if(wrap){const p=document.createElement('div');p.className='pile-paper';const angle=(Math.random()*28)-14;p.style.cssText=`left:${targetX}px;bottom:0px;transform:rotate(${angle}deg);position:absolute;`;wrap.appendChild(p);while(wrap.children.length>60)wrap.removeChild(wrap.firstChild)}paper.remove();pileCount++},dur)}))},b*40)}setTimeout(processBallotQueue,500)}
async function wsConnect(){try{setWsStatus('connecting');const liveRes=await fetch('/api/live-status').then(r=>r.json());if(!liveRes?.content?.chatChannelId)throw new Error('방송 중이 아니에요');channelIdCache=liveRes.content.chatChannelId;const tokenRes=await fetch(`/api/access-token?channelId=${encodeURIComponent(channelIdCache)}`).then(r=>r.json());const accessToken=tokenRes?.content?.accessToken||'';ws=new WebSocket('wss://kr-ss1.chat.naver.com/chat');ws.onopen=()=>{ws.send(JSON.stringify({ver:'2',cmd:100,svcid:'game',cid:channelIdCache,bdy:{uid:null,devType:2001,accTkn:accessToken,auth:'READ'},tid:1}));setWsStatus(true)};ws.onmessage=onWsMsg;ws.onclose=()=>{setWsStatus(false);if(wsAutoReconnect&&channelIdCache)wsReconnectTimer=setTimeout(wsConnect,5000)};ws.onerror=()=>setWsStatus('err')}catch(e){setWsStatus('err');showToast('⚠️ '+e.message)}}function wsDisconnect(){wsAutoReconnect=false;clearTimeout(wsReconnectTimer);if(ws)ws.close();setWsStatus(false)}function onWsMsg(e){try{const msg=JSON.parse(e.data);if(msg.cmd===93101&&msg.bdy){const chats=Array.isArray(msg.bdy)?msg.bdy:[msg.bdy];chats.forEach(chat=>{if(!chat.msg||!chat.profile)return;const profile=typeof chat.profile==='string'?JSON.parse(chat.profile):chat.profile;const nick=profile.nickname||'익명';processVote(nick,chat.msg.trim());if(currentWinner&&nick===currentWinner)addWinnerChat(chat.msg.trim())})}if(msg.cmd===0)ws.send(JSON.stringify({ver:'2',cmd:10000}))}catch(err){}}function addWinnerChat(msg){const feedId=currentRaffleKey===MANUAL_RAFFLE_KEY?'manual-winner-chat-feed':'winner-chat-feed';const feed=document.getElementById(feedId);if(!feed)return;const div=document.createElement('div');div.className='winner-chat-msg';div.textContent=msg;feed.appendChild(div);feed.scrollTop=feed.scrollHeight}setInterval(()=>{if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({ver:'2',cmd:10000}))},20000);
function parseNumberToken(text){if(!/^[0-9]+$/.test(text))return NaN;const first=text[0];if([...text].every(ch=>ch===first))return Number(first);return Number(text)}function processVote(nick,msg){if(!voteRunning)return;const text=msg.trim();const keys=Object.keys(voteOptions);if(!keys.length)return;let matchedKey=null;const cmdPrefix='!투표';if(text.startsWith(cmdPrefix)){const num=parseNumberToken(text.slice(cmdPrefix.length).trim());if(!Number.isNaN(num)&&num>=1&&num<=keys.length)matchedKey=keys[num-1]}if(!matchedKey)matchedKey=keys.find(k=>voteOptions[k]===text);if(!matchedKey){const num=parseNumberToken(text);if(!Number.isNaN(num)&&num>=1&&num<=keys.length)matchedKey=keys[num-1]}if(!matchedKey)return;const prev=voterMap[nick];if(prev===matchedKey)return;if(prev)voteCounts[prev]=Math.max(0,(voteCounts[prev]||0)-1);voterMap[nick]=matchedKey;voteCounts[matchedKey]=(voteCounts[matchedKey]||0)+1;updateStats();renderResults();launchBallot()}function updateStats(){const el=document.getElementById('total-votes');if(el)el.textContent=Object.values(voteCounts).reduce((s,v)=>s+v,0)}
function renderResults(){const el=document.getElementById('results');if(!el)return;const keys=Object.keys(voteOptions).length>0?Object.keys(voteOptions):Object.keys(voteCounts);if(!keys.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🗳</div><div>항목을 설정하고 투표를 시작하세요</div></div>`;return}const total=Object.values(voteCounts).reduce((s,v)=>s+v,0)||1;const sorted=keys.slice().sort((a,b)=>(voteCounts[b]||0)-(voteCounts[a]||0));const maxV=voteCounts[sorted[0]]||0;if(!window.optionColors)window.optionColors={};keys.forEach(k=>{if(!window.optionColors[k])window.optionColors[k]=`hsl(${Math.floor(Math.random()*360)},70%,58%)`});Object.keys(window.optionColors).forEach(k=>{if(!keys.includes(k))delete window.optionColors[k]});el.innerHTML=keys.map(k=>{const cnt=voteCounts[k]||0,pct=Math.round(cnt/total*100),isFirst=cnt>0&&cnt===maxV,col=window.optionColors[k];return`<div class="vote-item${isFirst?' first':''}" onclick="showOptionVoters('${escapeAttr(k)}')"><div class="vote-item-header"><div class="vote-item-name"><div class="vote-badge" style="${!isFirst?`background:${col}`:''}">${escapeHTML(k)}</div>${escapeHTML(voteOptions[k]||k)}</div><div class="vote-count">${cnt}표 (${pct}%)</div></div><div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%;${!isFirst?`background:${col}`:''}"></div></div></div>`}).join('')}
function showOptionVoters(key){closeManualRaffleModal();closeManualDrawModal();const voters=Object.keys(voterMap).filter(n=>voterMap[n]===key);const label=voteOptions[key]||`${key}번`;currentRaffleKey=key;raffleVoters=voters;winnersSet=new Set();document.getElementById('modal-title').textContent=`${label} (${voters.length}명)`;document.getElementById('modal-voters').innerHTML=voters.length?voters.map((n,i)=>`<span class="voter-chip" id="chip-${i}">${escapeHTML(n)}</span>`).join(''):`<div class="modal-empty">투표 인원 없음</div>`;const btn=document.getElementById('btn-raffle');btn.disabled=!voters.length;document.getElementById('voter-modal').classList.add('show')}
function parseManualRaffleNames(text){const seen=new Set();const sep=String.fromCharCode(10);return String(text||'').replaceAll(',',sep).split(sep).map(v=>v.trim()).filter(Boolean).filter(name=>{if(seen.has(name))return false;seen.add(name);return true})}function openManualRaffleModal(){closeVoterModal();closeManualDrawModal();renderManualRafflePreview();document.getElementById('manual-raffle-modal').classList.add('show')}function closeManualRaffleModal(){document.getElementById('manual-raffle-modal')?.classList.remove('show')}function onManualRaffleBackdrop(e){if(e.target.id==='manual-raffle-modal')closeManualRaffleModal()}function renderManualRafflePreview(){const el=document.getElementById('manual-raffle-preview'),btn=document.getElementById('btn-manual-raffle');if(!el||!btn)return;btn.disabled=!manualRaffleNames.some(n=>!manualWinnersSet.has(n));if(!manualRaffleNames.length){el.innerHTML='<div class="modal-empty">명단을 입력하고 적용을 눌러주세요</div>';return}el.innerHTML=manualRaffleNames.map(n=>`<span class="voter-chip ${manualWinnersSet.has(n)?'won':''}">${escapeHTML(n)}</span>`).join('')}function applyManualRaffle(){const input=document.getElementById('manual-raffle-input');manualRaffleNames=parseManualRaffleNames(input?.value||'');manualWinnersSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=new Date();if(window._resetManualDoc)window._resetManualDoc();renderManualRafflePreview();showToast(manualRaffleNames.length?`명단 ${manualRaffleNames.length}명 적용 완료`:'명단을 입력해주세요')}function resetManualRaffle(){manualRaffleNames=[];manualWinnersSet=new Set();manualWinnersLog=[];manualPendingWinner=null;manualStartedAt=null;if(window._resetManualDoc)window._resetManualDoc();const input=document.getElementById('manual-raffle-input');if(input)input.value='';renderManualRafflePreview();showToast('직접 명단 초기화 완료')}
function openManualDrawModal(){document.getElementById('manual-draw-modal').classList.add('show')}function closeManualDrawModal(){manualPendingWinner=null;currentWinner=null;document.getElementById('manual-draw-modal')?.classList.remove('show');document.getElementById('manual-draw-result')?.classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualRafflePreview()}function onManualDrawBackdrop(e){if(e.target.id==='manual-draw-modal')closeManualDrawModal()}function renderManualDrawVoters(){const el=document.getElementById('manual-draw-voters');if(!el)return;el.innerHTML=manualRaffleNames.map((n,i)=>`<span class="voter-chip ${manualWinnersSet.has(n)?'won':''}" id="draw-chip-${i}">${escapeHTML(n)}</span>`).join('');const btn=document.getElementById('btn-manual-redraw');if(btn)btn.disabled=!!manualPendingWinner||!manualRaffleNames.some(n=>!manualWinnersSet.has(n))}function startManualRaffle(){if(!manualRaffleNames.length){applyManualRaffle();if(!manualRaffleNames.length)return}if(!manualStartedAt)manualStartedAt=new Date();currentRaffleKey=MANUAL_RAFFLE_KEY;raffleVoters=manualRaffleNames.slice();winnersSet=manualWinnersSet;closeManualRaffleModal();document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';openManualDrawModal();renderManualDrawVoters()}function drawManualRaffle(){if(manualPendingWinner){showToast('저장 여부를 먼저 선택해주세요');return}if(!manualRaffleNames.length)return;if(!manualStartedAt)manualStartedAt=new Date();currentRaffleKey=MANUAL_RAFFLE_KEY;raffleVoters=manualRaffleNames.slice();winnersSet=manualWinnersSet;document.getElementById('manual-draw-result').classList.remove('show');document.getElementById('manual-save-actions')?.classList.remove('show');document.getElementById('manual-winner-chat-wrap')?.classList.remove('show');document.getElementById('manual-confetti-wrap').innerHTML='';renderManualDrawVoters();startRaffle()}
function startRaffle(){if(!raffleVoters.length)return;const eligible=raffleVoters.map((n,i)=>({name:n,idx:i})).filter(o=>!winnersSet.has(o.name));if(!eligible.length){showToast('🎉 모든 참가자가 당첨됐어요!');return}const isManual=currentRaffleKey===MANUAL_RAFFLE_KEY;const btn=isManual?document.getElementById('btn-manual-redraw'):document.getElementById('btn-raffle');if(btn)btn.disabled=true;const chipPrefix=isManual?'draw-chip-':'chip-';const chips=raffleVoters.map((_,i)=>document.getElementById(`${chipPrefix}${i}`));const total=eligible.length;const winner=eligible[Math.floor(Math.random()*eligible.length)];const SLOW_STEPS=8;const winnerEligibleIdx=eligible.indexOf(winner);const slowStartPos=(winnerEligibleIdx-SLOW_STEPS+1+total*100)%total;const slowDelays=[80,150,230,330,450,600,780,1000].map(d=>d+Math.floor(Math.random()*40-20));const laps=total<=10?3+Math.floor(Math.random()*3):total<=30?2+Math.floor(Math.random()*2):1+Math.floor(Math.random()*2);const startOffset=Math.floor(Math.random()*total);const fastFrames=total*laps+((slowStartPos-startOffset+total*100)%total);const fastDelay=total<=10?60+Math.floor(Math.random()*40):total<=30?20+Math.floor(Math.random()*20):15+Math.floor(Math.random()*10);let frame=0,lastLit=-1;function litChip(eligiblePos,on){const chip=chips[eligible[eligiblePos%total].idx];if(!chip)return;chip.classList.toggle('lit',on)}function step(){if(lastLit>=0)litChip(lastLit,false);if(frame>=fastFrames+SLOW_STEPS){const winChip=chips[winner.idx];if(winChip)winChip.classList.add('lit');winChip?.scrollIntoView({block:'nearest',behavior:'smooth'});setTimeout(()=>showWinner(winner.name),800);if(btn)btn.disabled=false;return}const pos=frame<fastFrames?(startOffset+frame)%total:(slowStartPos+(frame-fastFrames))%total;litChip(pos,true);lastLit=pos;const delay=frame<fastFrames?fastDelay:slowDelays[frame-fastFrames];frame++;setTimeout(step,delay)}step()}
const CF_COLORS=['#2ecc71','#f59e0b','#ef4444','#3b82f6','#a855f7','#ec4899','#fff','#fbbf24'];function launchConfetti(targetId='confetti-wrap'){const wrap=document.getElementById(targetId);if(!wrap)return;wrap.innerHTML='';const rect=wrap.getBoundingClientRect();const W=rect.width||window.innerWidth,H=rect.height||window.innerHeight;[{x:W*.18,y:H,baseAngle:-Math.PI*.72},{x:W*.82,y:H,baseAngle:-Math.PI*.28}].forEach(origin=>{for(let i=0;i<90;i++){const el=document.createElement('div');el.className='cf';const color=CF_COLORS[Math.floor(Math.random()*CF_COLORS.length)],w=7+Math.random()*12,h=11+Math.random()*16;el.style.cssText=`width:${w}px;height:${h}px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};position:absolute;left:0;top:0;`;wrap.appendChild(el);const angle=origin.baseAngle+(Math.random()-.5)*Math.PI*.6,speed=18+Math.random()*22;let vx=Math.cos(angle)*speed,vy=Math.sin(angle)*speed,x=origin.x,y=origin.y,rot=Math.random()*360;const rotSpeed=(Math.random()-.5)*18,gravity=.55,delay=Math.random()*300;setTimeout(()=>{let frame=0,maxFrames=140;function tick(){vy+=gravity;x+=vx;y+=vy;vx*=.985;rot+=rotSpeed;el.style.transform=`translate(${x}px,${y}px) rotate(${rot}deg)`;el.style.opacity=Math.max(0,1-frame/maxFrames);if(frame<maxFrames&&y<H+80){frame++;requestAnimationFrame(tick)}else el.remove()}requestAnimationFrame(tick)},delay)}})}
function showManualDrawWinner(name){currentWinner=name;manualPendingWinner=name;renderManualDrawVoters();const idx=raffleVoters.indexOf(name);if(idx>=0){const chip=document.getElementById(`draw-chip-${idx}`);if(chip){chip.classList.remove('lit');chip.classList.add('won')}}document.getElementById('manual-draw-name').textContent=name;document.getElementById('manual-draw-result').classList.add('show');document.getElementById('manual-save-actions')?.classList.add('show');document.getElementById('manual-winner-chat-wrap')?.classList.add('show');document.getElementById('manual-winner-chat-feed').innerHTML='';launchConfetti('manual-confetti-wrap');const btn=document.getElementById('btn-manual-redraw');if(btn)btn.disabled=true}function saveManualWinner(){const name=manualPendingWinner;if(!name)return;if(!manualWinnersLog.includes(name)){manualWinnersLog.push(name);if(window._upsertManualResult)window._upsertManualResult('직접 명단 추첨',[...manualWinnersLog],manualStartedAt||new Date()).catch(()=>{})}manualPendingWinner=null;currentWinner=null;document.getElementById('manual-save-actions')?.classList.remove('show');renderManualDrawVoters();showToast('content에 저장했습니다')}function skipManualWinner(){if(!manualPendingWinner)return;manualPendingWinner=null;currentWinner=null;document.getElementById('manual-save-actions')?.classList.remove('show');renderManualDrawVoters();showToast('저장하지 않고 제외했습니다')}
function showWinner(name){winnersSet.add(name);currentWinner=name;if(currentRaffleKey===MANUAL_RAFFLE_KEY){showManualDrawWinner(name);return}launchConfetti();const idx=raffleVoters.indexOf(name);if(idx>=0){const chip=document.getElementById(`chip-${idx}`);if(chip){chip.classList.remove('lit');chip.classList.add('won')}}const label=voteOptions[currentRaffleKey]||`${currentRaffleKey}번`;document.getElementById('winner-name').textContent=name;document.getElementById('winner-option').textContent=label;document.getElementById('winner-chat-feed').innerHTML='';document.getElementById('winner-overlay').classList.add('show')}function closeWinner(){if(currentWinner){winnersLog.push(currentWinner);const voteTitle=document.getElementById('vote-title-input')?.value?.trim()||'투표';if(window._upsertVoteResult)window._upsertVoteResult(voteTitle,[...winnersLog],voteStartedAt).catch(()=>{})}currentWinner=null;const overlay=document.getElementById('winner-overlay');overlay.classList.remove('show')}function cancelWinner(){if(currentWinner){const chipIdx=raffleVoters.indexOf(currentWinner);if(chipIdx>=0){const chip=document.getElementById(`chip-${chipIdx}`);if(chip){chip.classList.remove('won');chip.classList.add('won-cancelled')}}}currentWinner=null;document.getElementById('winner-overlay').classList.remove('show');showToast('취소됨 · 다음 뽑기에서 제외돼요')}function closeVoterModal(){document.getElementById('voter-modal')?.classList.remove('show')}function onModalBackdrop(e){if(e.target.id==='voter-modal')closeVoterModal()}function setWsStatus(state){const dot=document.getElementById('ws-dot'),label=document.getElementById('ws-label');if(state===true){wsConnected=true;wsAutoReconnect=true;dot.style.background='';dot.className='ws-dot on';label.textContent='채팅 연결됨'}else if(state==='connecting'){dot.className='ws-dot';dot.style.background='#f59e0b';label.textContent='연결 중...'}else if(state==='err'){wsConnected=false;dot.className='ws-dot err';label.textContent='연결 실패';voteRunning=false;updateVoteControls();toggleVotePanels()}else{wsConnected=false;dot.className='ws-dot';dot.style.background='';label.textContent='연결 안됨'}}function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
renderOptionInputs();applyOptions();renderResults();updateVoteControls();toggleVotePanels();renderManualRafflePreview();wsConnect();
