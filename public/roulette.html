<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pinball Roulette - 첫째와둘째</title>
<link rel="stylesheet" href="/fonts/ownglyph-uiyeon/ownglyph-uiyeon.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b1020;--surface:#141b30;--surface2:#1d2742;--text:#eef2ff;--text2:#98a4c7;--accent:#6d5dfc;--gold:#fbbf24;--border:rgba(255,255,255,.14);--radius:14px}
body{font-family:'Ownglyph Uiyeon',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:radial-gradient(1200px 500px at 20% 0%,rgba(109,93,252,.22),transparent),var(--bg);color:var(--text)}
.page{max-width:1120px;margin:0 auto;padding:22px 16px 34px}
.header{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.title{font-size:30px;font-weight:900;letter-spacing:-.5px}.title span{color:var(--gold)}
.sub{font-size:13px;color:var(--text2)}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px}@media(max-width:980px){.layout{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.board{height:520px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:#0f1529;position:relative}
.board canvas{display:block}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff}.btn-gold{background:linear-gradient(135deg,#f59e0b,var(--gold));color:#261700}.btn-ghost{background:#283250;color:#d3dcff;border:1px solid rgba(255,255,255,.12)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.winner{margin-top:10px;padding:14px;border-radius:12px;border:1px solid rgba(251,191,36,.45);background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(245,158,11,.08));display:none;text-align:center}
.winner.show{display:block}.winner small{display:block;color:#fcd34d;font-weight:800}.winner b{font-size:38px}
textarea{width:100%;min-height:130px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:var(--surface2);color:#fff;padding:10px;font-family:inherit;font-size:13px;outline:none;resize:vertical}
.help{font-size:12px;color:var(--text2);line-height:1.5;margin-top:8px}
.list{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:250px;overflow:auto}
.item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid rgba(255,255,255,.09);border-radius:9px}
.badge{font-size:11px;background:#2b3658;color:#d6e0ff;padding:2px 8px;border-radius:20px;font-weight:800}
.empty{padding:10px;color:#5e6b90;text-align:center}
.history{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <div class="title">🎯 <span>Pinball</span> Roulette</div>
      <div class="sub">참고한 사이트처럼 핀볼 보드에서 공이 떨어져 당첨자를 결정합니다.</div>
    </div>
    <div class="sub">입력 예시: 수박*2, 키위*3, 귤</div>
  </div>

  <div class="layout">
    <div class="card">
      <div id="board" class="board"></div>
      <div class="controls">
        <button id="draw-btn" class="btn btn-gold" onclick="startDraw()">🎰 Draw</button>
        <button class="btn btn-ghost" onclick="shuffleEntrants()">🔀 Shuffle</button>
        <button class="btn btn-ghost" onclick="resetHistory()">🗑 History Reset</button>
      </div>
      <div id="winner-box" class="winner"><small>WINNER</small><b id="winner-name"></b></div>
    </div>

    <div class="card">
      <div style="font-weight:800;margin-bottom:8px">참가자 입력</div>
      <textarea id="names-input">수박*2, 키위*3, 귤*1</textarea>
      <div class="controls" style="margin-top:8px"><button class="btn btn-primary" onclick="applyEntrants()">적용</button></div>
      <div class="help">쉼표로 구분하고 <code>*숫자</code>로 가중치를 줄 수 있습니다.</div>

      <div style="font-weight:800;margin-top:12px">현재 참가자</div>
      <div id="entrant-list" class="list"></div>

      <div class="history">
        <div style="font-weight:800">당첨 히스토리</div>
        <div id="history-list" class="list"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
const {Engine,Render,Runner,World,Bodies,Body,Events}=Matter;
const STORAGE_NAMES='pinball-roulette-names-v1';
const STORAGE_HISTORY='pinball-roulette-history-v1';

let entrants=[]; // {name,count}
let history=JSON.parse(localStorage.getItem(STORAGE_HISTORY)||'[]');
let engine, render, runner;
let sensors=[];
let drawing=false;

function parseEntrants(text){
  const map=new Map();
  text.split(',').map(v=>v.trim()).filter(Boolean).forEach(raw=>{
    const m=raw.match(/^(.*?)(?:\*(\d+))?$/);
    if(!m) return;
    const name=(m[1]||'').trim();
    const count=Math.max(1,Number(m[2]||1));
    if(!name) return;
    map.set(name,(map.get(name)||0)+count);
  });
  return [...map.entries()].map(([name,count])=>({name,count}));
}

function renderEntrants(){
  const el=document.getElementById('entrant-list');
  if(!entrants.length){ el.innerHTML='<div class="empty">참가자를 입력하세요</div>'; return; }
  const total=entrants.reduce((s,e)=>s+e.count,0);
  el.innerHTML=entrants.map(e=>`<div class="item"><span>${e.name}</span><span class="badge">${e.count}장 · ${Math.round(e.count/total*100)}%</span></div>`).join('');
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){ el.innerHTML='<div class="empty">아직 없음</div>'; return; }
  el.innerHTML=history.slice(0,20).map(h=>`<div class="item"><span>${h.name}</span><span class="badge">${h.time}</span></div>`).join('');
}

function applyEntrants(){
  const text=document.getElementById('names-input').value||'';
  entrants=parseEntrants(text);
  localStorage.setItem(STORAGE_NAMES,text);
  renderEntrants();
  buildWorld();
}

function shuffleEntrants(){
  for(let i=entrants.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [entrants[i],entrants[j]]=[entrants[j],entrants[i]]; }
  renderEntrants();
  buildWorld();
}

function resetHistory(){ history=[]; localStorage.setItem(STORAGE_HISTORY,JSON.stringify(history)); renderHistory(); }

function initMatter(){
  const host=document.getElementById('board');
  const w=host.clientWidth, h=host.clientHeight;
  engine=Engine.create();
  render=Render.create({element:host,engine,options:{width:w,height:h,wireframes:false,background:'#0f1529',pixelRatio:window.devicePixelRatio||1}});
  runner=Runner.create();
  Render.run(render); Runner.run(runner,engine);

  Events.on(engine,'collisionStart',event=>{
    if(!drawing) return;
    for(const pair of event.pairs){
      const a=pair.bodyA,b=pair.bodyB;
      const sensor=sensors.find(s=>s.body===a||s.body===b);
      const ball=(a.label==='ball'?a:(b.label==='ball'?b:null));
      if(sensor&&ball){ finishDraw(sensor.name,ball); return; }
    }
  });

  buildWorld();
}

function buildWorld(){
  const w=render.options.width, h=render.options.height;
  World.clear(engine.world,false);
  sensors=[];

  const wallOpt={isStatic:true,render:{fillStyle:'#334155'}};
  World.add(engine.world,[
    Bodies.rectangle(w/2,h+20,w,40,wallOpt),
    Bodies.rectangle(-20,h/2,40,h,wallOpt),
    Bodies.rectangle(w+20,h/2,40,h,wallOpt),
    Bodies.rectangle(w/2,-20,w,40,wallOpt)
  ]);

  // pegs
  const pegRows=8;
  for(let r=0;r<pegRows;r++){
    const y=70+r*34;
    const cols=10+(r%2);
    const gap=w/(cols+1);
    for(let c=1;c<=cols;c++){
      const shift=(r%2)?gap*0.5:0;
      const x=Math.min(w-18,c*gap+shift);
      World.add(engine.world,Bodies.circle(x,y,5,{isStatic:true,restitution:.4,render:{fillStyle:'#c7d2fe'}}));
    }
  }

  // weighted lanes + sensors
  if(!entrants.length) return;
  const total=entrants.reduce((s,e)=>s+e.count,0);
  let x=0;
  entrants.forEach((e,i)=>{
    const laneW=Math.max(42,(e.count/total)*w);
    const laneMid=x+laneW/2;
    const color=['#7c3aed','#ec4899','#22c55e','#f59e0b','#3b82f6','#14b8a6','#ef4444','#a855f7'][i%8];

    World.add(engine.world,Bodies.rectangle(laneMid,h-20,laneW-2,40,{isStatic:true,render:{fillStyle:color,opacity:.25}}));
    const sensor=Bodies.rectangle(laneMid,h-42,laneW-2,20,{isStatic:true,isSensor:true,label:'sensor',render:{fillStyle:'transparent'}});
    sensors.push({body:sensor,name:e.name});
    World.add(engine.world,sensor);

    // separators
    World.add(engine.world,Bodies.rectangle(x,h-60,4,120,{isStatic:true,angle:0.16,render:{fillStyle:'#64748b'}}));
    x+=laneW;
  });
}

function startDraw(){
  if(drawing||!entrants.length) return;
  drawing=true;
  document.getElementById('draw-btn').disabled=true;
  document.getElementById('winner-box').classList.remove('show');

  const w=render.options.width;
  const ball=Bodies.circle(w/2+(Math.random()*120-60),24,10,{label:'ball',restitution:.5,friction:.001,frictionAir:.0008,density:.0014,render:{fillStyle:'#fbbf24',strokeStyle:'#fff',lineWidth:1.5}});
  Body.setVelocity(ball,{x:(Math.random()-.5)*2.2,y:0});
  World.add(engine.world,ball);

  setTimeout(()=>{ if(drawing) finishDraw('선택 실패',ball); },9000);
}

function finishDraw(name,ball){
  drawing=false;
  document.getElementById('draw-btn').disabled=false;
  if(ball) World.remove(engine.world,ball);
  document.getElementById('winner-name').textContent=name;
  document.getElementById('winner-box').classList.add('show');
  history.unshift({name,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
  if(history.length>40) history.pop();
  localStorage.setItem(STORAGE_HISTORY,JSON.stringify(history));
  renderHistory();
}

// boot
const savedNames=localStorage.getItem(STORAGE_NAMES);
if(savedNames) document.getElementById('names-input').value=savedNames;
entrants=parseEntrants(document.getElementById('names-input').value||'');
renderEntrants();
renderHistory();
initMatter();
window.addEventListener('resize',()=>{
  const host=document.getElementById('board');
  render.canvas.width=host.clientWidth;
  render.canvas.height=host.clientHeight;
  render.options.width=host.clientWidth;
  render.options.height=host.clientHeight;
  buildWorld();
});
</script>
</body>
</html>
